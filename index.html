<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
        }
        .tab-btn.active {
            border-bottom: 2px solid #10b981; /* Emerald 500 */
            color: #10b981;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-slate-800 shadow-md border-b border-slate-700 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center space-x-3 mb-4 md:mb-0">
                <i class="fa-solid fa-trophy text-emerald-400 text-2xl"></i>
                <h1 class="text-xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-purple-500">
                    QUINIELA 2026
                </h1>
            </div>
            
            <div id="currentUserDisplay" class="text-sm font-medium text-slate-300 bg-slate-700 px-3 py-1 rounded-full hidden">
                <i class="fa-solid fa-user text-emerald-400 mr-2"></i><span id="currentUserName">Invitado</span>
            </div>
        </div>
        
        <!-- Navigation Tabs -->
        <div class="max-w-4xl mx-auto px-2">
            <div class="flex overflow-x-auto hide-scrollbar space-x-1 border-b border-slate-700">
                <button onclick="switchTab('ranking')" id="tab-ranking" class="tab-btn active px-4 py-3 text-sm font-semibold text-slate-400 hover:text-slate-200 whitespace-nowrap transition-colors">
                    <i class="fa-solid fa-list-ol mr-2"></i>Ranking
                </button>
                <button onclick="switchTab('resultados')" id="tab-resultados" class="tab-btn px-4 py-3 text-sm font-semibold text-slate-400 hover:text-slate-200 whitespace-nowrap transition-colors">
                    <i class="fa-solid fa-futbol mr-2"></i>Resultados
                </button>
                <button onclick="switchTab('pronosticos')" id="tab-pronosticos" class="tab-btn px-4 py-3 text-sm font-semibold text-slate-400 hover:text-slate-200 whitespace-nowrap transition-colors">
                    <i class="fa-solid fa-pen-to-square mr-2"></i>Pronósticos
                </button>
                <button onclick="switchTab('normas')" id="tab-normas" class="tab-btn px-4 py-3 text-sm font-semibold text-slate-400 hover:text-slate-200 whitespace-nowrap transition-colors">
                    <i class="fa-solid fa-book mr-2"></i>Normas
                </button>
                <button onclick="switchTab('ajustes')" id="tab-ajustes" class="tab-btn px-4 py-3 text-sm font-semibold text-slate-400 hover:text-slate-200 whitespace-nowrap transition-colors">
                    <i class="fa-solid fa-gear mr-2"></i>Ajustes
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-4xl w-full mx-auto p-4 relative">
        
        <!-- Loading State -->
        <div id="loadingOverlay" class="absolute inset-0 bg-slate-900 bg-opacity-90 z-40 flex flex-col items-center justify-center rounded-lg">
            <i class="fa-solid fa-circle-notch fa-spin text-emerald-500 text-4xl mb-4"></i>
            <p class="text-slate-300">Conectando con el servidor...</p>
        </div>

        <!-- Tab Contents -->
        <div id="content-ranking" class="tab-content hidden fade-in"></div>
        <div id="content-resultados" class="tab-content hidden fade-in"></div>
        <div id="content-pronosticos" class="tab-content hidden fade-in"></div>
        <div id="content-normas" class="tab-content hidden fade-in"></div>
        <div id="content-ajustes" class="tab-content fade-in"></div> <!-- Hacemos ajustes la pestaña principal para el login -->

    </main>

    <!-- Custom Toast Notification Container -->
    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col space-y-2 pointer-events-none"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        // Importamos GoogleAuthProvider y signInWithPopup
        import { getAuth, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, addDoc, deleteDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // CONFIGURACIÓN PARA GITHUB PAGES
        // ==========================================
        // Si descargas esto para tu propio Github Pages, reemplaza `fallbackConfig` con 
        // los datos reales de tu proyecto de Firebase (Firebase Console -> Project Settings).
        const fallbackConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        // Entorno Inmersivo variables
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quiniela-mundial-2026';
        let firebaseConfig = fallbackConfig;
        
        if (typeof __firebase_config !== 'undefined') {
            try {
                firebaseConfig = JSON.parse(__firebase_config);
            } catch(e) {
                console.warn("Invalid injected config, using fallback.");
            }
        }

        // ==========================================
        // ESTADO GLOBAL DE LA APLICACIÓN
        // ==========================================
        let app, db, auth, googleProvider;
        let globalData = {
            users: [],
            matches: [],
            predictions: []
        };
        let activeUserId = null; // ID del usuario autenticado (uid de Google)
        let activeUserEmail = null; // Correo del usuario autenticado
        
        // ==========================================
        // CONFIGURACIÓN DE ADMINISTRADOR
        // ¡IMPORTANTE! Reemplaza este correo con tu cuenta real de Google
        // ==========================================
        const adminEmails = ['tu_correo@gmail.com']; 

        let currentTab = 'ajustes'; // Iniciamos en ajustes para el login
        let unsubs = [];

        // Sistema de notificaciones (Reemplazo seguro de alert())
        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            let bgClass = type === 'success' ? 'bg-emerald-600' : 'bg-red-600';
            if (type === 'warning') bgClass = 'bg-yellow-600';

            toast.className = `${bgClass} text-white px-4 py-3 rounded shadow-lg flex items-center space-x-2 transition-all duration-300 transform translate-y-10 opacity-0`;
            toast.innerHTML = `
                <i class="fa-solid ${type === 'success' ? 'fa-check-circle' : type === 'warning' ? 'fa-triangle-exclamation' : 'fa-circle-xmark'}"></i>
                <span class="text-sm font-medium">${message}</span>
            `;
            
            container.appendChild(toast);
            
            // Animar entrada
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            });

            // Remover después de 3 segundos
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // Control de Pestañas
        window.switchTab = function(tabId) {
            currentTab = tabId;
            // Actualizar botones
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active', 'text-emerald-400'));
            const activeBtn = document.getElementById(`tab-${tabId}`);
            if(activeBtn) {
                activeBtn.classList.add('active');
                activeBtn.classList.remove('text-slate-400');
            }
            
            // Mostrar contenido
            document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
            const activeContent = document.getElementById(`content-${tabId}`);
            if(activeContent) activeContent.classList.remove('hidden');

            renderCurrentTab();
        };

        function renderCurrentTab() {
            if(currentTab === 'ranking') renderRanking();
            if(currentTab === 'resultados') renderResultados();
            if(currentTab === 'pronosticos') renderPronosticos();
            if(currentTab === 'normas') renderNormas();
            if(currentTab === 'ajustes') renderAjustes();
        }

        async function initApp() {
            try {
                // Si la config es la de fallback y no ha sido modificada, puede fallar al conectar.
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                googleProvider = new GoogleAuthProvider();

                // Escuchar cambios en el estado de autenticación
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        activeUserId = user.uid;
                        activeUserEmail = user.email;
                        await ensureUserExists(user);
                        setupRealtimeListeners();
                        if (currentTab === 'ajustes') {
                            switchTab('ranking'); // Ir al ranking una vez logueado
                        }
                    } else {
                        activeUserId = null;
                        activeUserEmail = null;
                        document.getElementById('loadingOverlay').classList.add('hidden');
                        if (currentTab !== 'ajustes') {
                             switchTab('ajustes');
                        } else {
                             renderAjustes(); // Forzar render de ajustes para mostrar botón de login
                        }
                    }
                });

                // En el entorno inmersivo, podríamos tener un token inicial
                if (typeof __initial_auth_token !== 'undefined' && !auth.currentUser) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                }

            } catch (error) {
                console.error("Error inicializando Firebase:", error);
                document.getElementById('loadingOverlay').innerHTML = `
                    <div class="bg-red-900/50 p-6 rounded-lg text-center max-w-md border border-red-700">
                        <i class="fa-solid fa-triangle-exclamation text-red-500 text-4xl mb-4"></i>
                        <h2 class="text-xl font-bold text-white mb-2">Falta Configuración</h2>
                        <p class="text-red-200 text-sm mb-4">Para que el multijugador funcione en GitHub Pages, debes editar el archivo y colocar la configuración de tu proyecto de Firebase en la variable <code>fallbackConfig</code>.</p>
                    </div>
                `;
            }
        }

        function getCollectionRef(colName) {
            // Regla mandatoria: /artifacts/{appId}/public/data/{collectionName}
            return collection(db, 'artifacts', appId, 'public', 'data', colName);
        }

        async function ensureUserExists(authUser) {
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', authUser.uid);
            const userSnap = await getDoc(userRef);
            
            const userData = {
                id: authUser.uid,
                name: authUser.displayName || 'Participante',
                photoURL: authUser.photoURL || '',
                email: authUser.email || '',
                lastLogin: Date.now()
            };

            if (!userSnap.exists()) {
                userData.createdAt = Date.now();
                await setDoc(userRef, userData);
            } else {
                // Actualizar info en caso de que haya cambiado en Google
                await updateDoc(userRef, {
                    name: userData.name,
                    photoURL: userData.photoURL,
                    lastLogin: userData.lastLogin
                });
            }
        }

        function setupRealtimeListeners() {
            // Limpiar listeners anteriores si existen
            unsubs.forEach(unsub => unsub());
            unsubs = [];

            const usersRef = getCollectionRef('users');
            const matchesRef = getCollectionRef('matches');
            const predictionsRef = getCollectionRef('predictions');

            // Listeners
            unsubs.push(
                onSnapshot(usersRef, (snapshot) => {
                    globalData.users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    updateUI();
                }, (error) => console.error("Error users:", error))
            );

            unsubs.push(
                onSnapshot(matchesRef, (snapshot) => {
                    globalData.matches = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // Ordenar por fecha localmente
                    globalData.matches.sort((a, b) => new Date(a.date) - new Date(b.date));
                    updateUI();
                }, (error) => console.error("Error matches:", error))
            );

            unsubs.push(
                onSnapshot(predictionsRef, (snapshot) => {
                    globalData.predictions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    updateUI();
                }, (error) => console.error("Error predictions:", error))
            );
            
            // Ocultar loading
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function updateUI() {
            // Actualizar display de usuario activo
            const userDisplay = document.getElementById('currentUserDisplay');
            if (activeUserId && globalData.users.length > 0) {
                const user = globalData.users.find(u => u.id === activeUserId);
                if (user) {
                    document.getElementById('currentUserName').innerHTML = `
                        ${user.photoURL ? `<img src="${user.photoURL}" class="w-6 h-6 rounded-full inline-block mr-2 border border-emerald-500">` : `<i class="fa-solid fa-user text-emerald-400 mr-2"></i>`}
                        ${user.name}
                    `;
                    userDisplay.classList.remove('hidden');
                }
            } else {
                userDisplay.classList.add('hidden');
            }

            renderCurrentTab();
        }

        function calculatePoints() {
            // Inicializar contadores
            let stats = {};
            globalData.users.forEach(u => {
                stats[u.id] = { ...u, exact: 0, partial: 0, totalPoints: 0 };
            });

            // Procesar predicciones vs resultados
            globalData.predictions.forEach(pred => {
                const match = globalData.matches.find(m => m.id === pred.matchId);
                // Si el partido no existe o no tiene resultado final, ignorar
                if (!match || match.scoreA === null || match.scoreA === '' || match.scoreB === null || match.scoreB === '') return;
                
                const userStat = stats[pred.userId];
                if (!userStat) return;

                const pA = parseInt(pred.scoreA);
                const pB = parseInt(pred.scoreB);
                const rA = parseInt(match.scoreA);
                const rB = parseInt(match.scoreB);

                if (isNaN(pA) || isNaN(pB) || isNaN(rA) || isNaN(rB)) return;

                // Lógica de puntuación
                if (pA === rA && pB === rB) {
                    // Exacto: 3 puntos
                    userStat.exact += 1;
                    userStat.totalPoints += 3;
                } else {
                    // Ver si acertó el ganador o empate
                    const predDiff = pA - pB;
                    const realDiff = rA - rB;
                    
                    const acertado = (predDiff > 0 && realDiff > 0) || // Gana A
                                     (predDiff < 0 && realDiff < 0) || // Gana B
                                     (predDiff === 0 && realDiff === 0); // Empate
                    
                    if (acertado) {
                        userStat.partial += 1;
                        userStat.totalPoints += 1;
                    }
                }
            });

            // Convertir a array y ordenar (Mayor a menor puntos)
            return Object.values(stats).sort((a, b) => {
                if (b.totalPoints !== a.totalPoints) return b.totalPoints - a.totalPoints;
                // Desempate por aciertos exactos
                return b.exact - a.exact;
            });
        }

        function renderRanking() {
            const container = document.getElementById('content-ranking');
            const ranking = calculatePoints();

            if (ranking.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-500"><i class="fa-solid fa-users text-4xl mb-3"></i><p>Aún no hay participantes en la liga.</p></div>`;
                return;
            }

            let html = `
                <div class="bg-slate-800 rounded-xl shadow-lg overflow-hidden border border-slate-700">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-900 text-slate-400 text-xs uppercase tracking-wider">
                                    <th class="p-4 w-16 text-center">Pos</th>
                                    <th class="p-4">Participante</th>
                                    <th class="p-4 text-center tooltip" title="Aciertos Exactos (3pts)">Exactos</th>
                                    <th class="p-4 text-center tooltip" title="Acertar Ganador (1pt)">Parciales</th>
                                    <th class="p-4 text-center font-bold text-emerald-400">Puntos</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-700/50">
            `;

            ranking.forEach((user, index) => {
                let badge = '';
                if (index === 0) badge = '<i class="fa-solid fa-medal text-yellow-400 text-xl drop-shadow-md"></i>';
                else if (index === 1) badge = '<i class="fa-solid fa-medal text-slate-300 text-xl"></i>';
                else if (index === 2) badge = '<i class="fa-solid fa-medal text-amber-700 text-xl"></i>';
                else badge = `<span class="text-slate-500 font-bold">${index + 1}</span>`;

                const rowClass = user.id === activeUserId ? 'bg-slate-700/50 border-l-4 border-emerald-500' : 'hover:bg-slate-800/80';
                
                const avatar = user.photoURL 
                    ? `<img src="${user.photoURL}" class="w-8 h-8 rounded-full inline-block mr-3 border border-slate-600">` 
                    : `<div class="w-8 h-8 rounded-full inline-flex items-center justify-center bg-emerald-700 text-white font-bold mr-3">${user.name.charAt(0).toUpperCase()}</div>`;

                html += `
                    <tr class="${rowClass} transition-colors">
                        <td class="p-4 text-center">${badge}</td>
                        <td class="p-4 font-semibold text-slate-200 flex items-center">${avatar} ${user.name}</td>
                        <td class="p-4 text-center text-slate-400">${user.exact}</td>
                        <td class="p-4 text-center text-slate-400">${user.partial}</td>
                        <td class="p-4 text-center font-bold text-xl text-emerald-400">${user.totalPoints}</td>
                    </tr>
                `;
            });

            html += `</tbody></table></div></div>`;
            container.innerHTML = html;
        }

        function renderResultados() {
            const container = document.getElementById('content-resultados');
            const isAdmin = adminEmails.includes(activeUserEmail);
            
            if (globalData.matches.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-500"><i class="fa-solid fa-calendar-xmark text-4xl mb-3"></i><p>No hay partidos registrados. El administrador debe crearlos.</p></div>`;
                return;
            }

            let html = `<div class="space-y-4">
                ${isAdmin ? `
                <div class="bg-blue-900/30 border border-blue-800 p-4 rounded-lg text-sm text-blue-200 mb-6 flex items-start">
                    <i class="fa-solid fa-user-shield mt-1 mr-3 text-blue-400"></i>
                    <p><strong>Panel de Administrador:</strong> Ingresa los resultados reales o bloquea los pronósticos de cada partido para evitar que los usuarios hagan trampas antes de iniciar.</p>
                </div>` : ''}
            `;

            globalData.matches.forEach(match => {
                const sA = match.scoreA !== null ? match.scoreA : '';
                const sB = match.scoreB !== null ? match.scoreB : '';
                const isFinished = sA !== '' && sB !== '';
                const isLocked = match.isLocked || false;

                html += `
                    <div class="bg-slate-800 p-4 rounded-xl shadow border ${isLocked ? 'border-orange-900/50' : 'border-slate-700'} relative overflow-hidden">
                        ${isFinished ? '<div class="absolute top-0 right-0 bg-emerald-600 text-xs px-2 py-1 rounded-bl-lg font-semibold shadow-sm">FINALIZADO</div>' : (isLocked ? '<div class="absolute top-0 right-0 bg-orange-600 text-xs px-2 py-1 rounded-bl-lg font-semibold shadow-sm"><i class="fa-solid fa-lock mr-1"></i> BLOQUEADO</div>' : '')}
                        
                        <div class="text-center text-xs text-slate-400 mb-3 font-semibold uppercase tracking-wider">${match.stage} - ${match.date}</div>
                        
                        <div class="flex items-center justify-center space-x-2 md:space-x-6">
                            <div class="flex-1 text-right font-bold text-lg text-slate-200 truncate pr-2">${match.teamA}</div>
                            
                            <div class="flex items-center space-x-2 bg-slate-900 p-2 rounded-lg border border-slate-700">
                                ${isAdmin ? `
                                <input type="number" id="res_${match.id}_A" value="${sA}" class="w-12 h-10 bg-slate-800 text-white text-center font-bold text-xl rounded focus:ring-2 focus:ring-emerald-500 outline-none" min="0">
                                <span class="text-slate-500 font-bold">-</span>
                                <input type="number" id="res_${match.id}_B" value="${sB}" class="w-12 h-10 bg-slate-800 text-white text-center font-bold text-xl rounded focus:ring-2 focus:ring-emerald-500 outline-none" min="0">
                                ` : `
                                <div class="w-12 h-10 flex items-center justify-center bg-slate-800 text-white font-bold text-xl rounded">${sA}</div>
                                <span class="text-slate-500 font-bold">-</span>
                                <div class="w-12 h-10 flex items-center justify-center bg-slate-800 text-white font-bold text-xl rounded">${sB}</div>
                                `}
                            </div>
                            
                            <div class="flex-1 text-left font-bold text-lg text-slate-200 truncate pl-2">${match.teamB}</div>
                        </div>

                        ${isAdmin ? `
                        <div class="mt-4 flex justify-center space-x-3 border-t border-slate-700/50 pt-4">
                            <button onclick="saveResult('${match.id}')" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-sm font-semibold rounded-lg transition shadow-md flex items-center text-emerald-400">
                                <i class="fa-solid fa-save mr-2"></i> Guardar Final
                            </button>
                            <button onclick="toggleLock('${match.id}', ${isLocked})" class="px-4 py-2 ${isLocked ? 'bg-orange-900/50 hover:bg-orange-900/80 text-orange-400' : 'bg-slate-700 hover:bg-slate-600 text-slate-300'} text-sm font-semibold rounded-lg transition shadow-md flex items-center border border-slate-600">
                                <i class="fa-solid ${isLocked ? 'fa-unlock' : 'fa-lock'} mr-2"></i> ${isLocked ? 'Desbloquear Pronósticos' : 'Bloquear Pronósticos'}
                            </button>
                        </div>
                        ` : ''}
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        function renderPronosticos() {
            const container = document.getElementById('content-pronosticos');

            if (!activeUserId) {
                container.innerHTML = `
                    <div class="bg-slate-800 border border-emerald-600/50 p-8 rounded-xl text-center shadow-lg">
                        <i class="fa-brands fa-google text-6xl text-emerald-500 mb-4 drop-shadow-md"></i>
                        <h2 class="text-2xl font-bold text-white mb-2">Inicia Sesión</h2>
                        <p class="text-slate-300 mb-6">Para guardar tus pronósticos, debes iniciar sesión con tu cuenta de Google.</p>
                        <button onclick="loginWithGoogle()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-6 rounded-full transition-all shadow-[0_0_15px_rgba(16,185,129,0.4)] flex items-center justify-center mx-auto">
                            <i class="fa-brands fa-google mr-2"></i> Entrar con Google
                        </button>
                    </div>
                `;
                return;
            }

            if (globalData.matches.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-500"><i class="fa-solid fa-futbol text-4xl mb-3"></i><p>No hay partidos programados todavía.</p></div>`;
                return;
            }

            const activeUser = globalData.users.find(u => u.id === activeUserId);
            if (!activeUser) return;

            let html = `
                <div class="mb-6 bg-emerald-900/20 border border-emerald-800 p-4 rounded-lg flex items-center">
                    ${activeUser.photoURL 
                        ? `<img src="${activeUser.photoURL}" class="h-10 w-10 rounded-full mr-4 shadow-md border-2 border-emerald-500">`
                        : `<div class="bg-emerald-600 rounded-full h-10 w-10 flex items-center justify-center text-xl font-bold text-white mr-4 shadow-md">${activeUser.name.charAt(0).toUpperCase()}</div>`
                    }
                    <div>
                        <h3 class="text-white font-bold">Pronósticos de <span class="text-emerald-400">${activeUser.name}</span></h3>
                        <p class="text-sm text-slate-400">Guarda tus resultados antes de que comiencen los partidos.</p>
                    </div>
                </div>
                <div class="space-y-4">
            `;

            globalData.matches.forEach(match => {
                const pred = globalData.predictions.find(p => p.matchId === match.id && p.userId === activeUserId);
                const sA = pred ? pred.scoreA : '';
                const sB = pred ? pred.scoreB : '';
                const hasPred = pred !== undefined;

                const isFinished = match.scoreA !== null && match.scoreA !== '';
                const isLocked = match.isLocked || false;
                const cannotEdit = isFinished || isLocked;

                const borderClass = hasPred ? 'border-emerald-500/50 bg-slate-800 shadow-[0_0_10px_rgba(16,185,129,0.1)]' : 'border-slate-700 bg-slate-800';

                html += `
                    <div class="p-4 rounded-xl border ${borderClass} relative transition-all">
                        ${cannotEdit ? `<div class="absolute inset-0 bg-slate-900/70 z-10 flex items-center justify-center rounded-xl backdrop-blur-[2px]"><span class="${isFinished ? 'bg-red-600 border-red-500' : 'bg-orange-600 border-orange-500'} text-white px-3 py-1 rounded font-bold text-sm shadow-lg border"><i class="fa-solid fa-lock mr-2"></i>${isFinished ? 'PARTIDO CERRADO' : 'PRONÓSTICOS BLOQUEADOS'}</span></div>` : ''}
                        
                        <div class="text-center text-xs text-slate-400 mb-2 uppercase tracking-wide">${match.stage}</div>
                        
                        <div class="flex justify-between items-center px-2 md:px-8">
                            <div class="text-right font-bold w-1/3 text-lg md:text-xl truncate text-slate-200">${match.teamA}</div>
                            
                            <div class="w-1/3 flex justify-center items-center space-x-2">
                                <input type="number" id="pred_${match.id}_A" value="${sA}" ${cannotEdit ? 'disabled' : ''} class="w-12 h-12 bg-slate-900 border border-slate-600 text-white text-center font-bold text-xl rounded-lg focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition disabled:opacity-50" min="0">
                                <span class="text-slate-500 font-bold">-</span>
                                <input type="number" id="pred_${match.id}_B" value="${sB}" ${cannotEdit ? 'disabled' : ''} class="w-12 h-12 bg-slate-900 border border-slate-600 text-white text-center font-bold text-xl rounded-lg focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition disabled:opacity-50" min="0">
                            </div>
                            
                            <div class="text-left font-bold w-1/3 text-lg md:text-xl truncate text-slate-200">${match.teamB}</div>
                        </div>

                        <div class="mt-4 text-center">
                            <button onclick="savePrediction('${match.id}')" ${cannotEdit ? 'disabled' : ''} class="px-6 py-2 ${hasPred ? 'bg-slate-700 hover:bg-slate-600' : 'bg-emerald-600 hover:bg-emerald-500'} text-white text-sm font-bold rounded-full transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed relative z-20">
                                ${hasPred ? '<i class="fa-solid fa-check text-emerald-400 mr-2"></i>Actualizar' : 'Guardar Pronóstico'}
                            </button>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        window.toggleLock = async function(matchId, currentState) {
            if (!auth.currentUser || !adminEmails.includes(activeUserEmail)) { 
                showToast("Acceso denegado: Solo el administrador puede bloquear partidos.", "error"); 
                return; 
            }

            try {
                const matchRef = doc(db, 'artifacts', appId, 'public', 'data', 'matches', matchId);
                await updateDoc(matchRef, { isLocked: !currentState });
                showToast(!currentState ? "Pronósticos bloqueados" : "Pronósticos desbloqueados", "warning");
            } catch (error) {
                console.error("Error al cambiar estado:", error);
                showToast("Error al actualizar el estado", "error");
            }
        };

        window.saveResult = async function(matchId) {
            if (!auth.currentUser || !adminEmails.includes(activeUserEmail)) { 
                showToast("Acceso denegado", "error"); 
                return; 
            }

            const valA = document.getElementById(`res_${matchId}_A`).value;
            const valB = document.getElementById(`res_${matchId}_B`).value;

            const scoreA = valA !== '' ? parseInt(valA) : null;
            const scoreB = valB !== '' ? parseInt(valB) : null;

            try {
                const matchRef = doc(db, 'artifacts', appId, 'public', 'data', 'matches', matchId);
                await updateDoc(matchRef, { scoreA, scoreB });
                showToast("Resultado oficial actualizado");
            } catch (error) {
                console.error("Error al guardar resultado:", error);
                showToast("Error al guardar el resultado", "error");
            }
        };

        window.savePrediction = async function(matchId) {
            if (!auth.currentUser) return;
            if (!activeUserId) {
                showToast("Selecciona tu perfil primero", "warning");
                return;
            }

            // Seguridad extra en cliente
            const match = globalData.matches.find(m => m.id === matchId);
            if (match && (match.isLocked || match.scoreA !== null)) {
                 showToast("Este partido ya está bloqueado para pronósticos", "error");
                 return;
            }

            const valA = document.getElementById(`pred_${matchId}_A`).value;
            const valB = document.getElementById(`pred_${matchId}_B`).value;

            if (valA === '' || valB === '') {
                showToast("Ingresa ambos marcadores", "warning");
                return;
            }

            try {
                const predId = `${matchId}_${activeUserId}`;
                const predRef = doc(db, 'artifacts', appId, 'public', 'data', 'predictions', predId);
                
                await setDoc(predRef, {
                    matchId: matchId,
                    userId: activeUserId,
                    scoreA: parseInt(valA),
                    scoreB: parseInt(valB),
                    timestamp: Date.now()
                }, { merge: true }); 
                
                showToast("Pronóstico guardado exitosamente");
            } catch (error) {
                console.error("Error saving prediction:", error);
                showToast("Error guardando pronóstico", "error");
            }
        };

        function renderAjustes() {
            const container = document.getElementById('content-ajustes');
            
            let authSection = '';
            
            if (activeUserId) {
                const activeUser = globalData.users.find(u => u.id === activeUserId);
                if (activeUser) {
                    authSection = `
                        <div class="bg-slate-800 p-6 rounded-xl border border-emerald-700 shadow-[0_0_15px_rgba(16,185,129,0.1)] text-center">
                            ${activeUser.photoURL 
                                ? `<img src="${activeUser.photoURL}" class="w-20 h-20 rounded-full mx-auto mb-4 border-4 border-emerald-500 shadow-lg">`
                                : `<div class="w-20 h-20 rounded-full mx-auto mb-4 bg-emerald-600 flex items-center justify-center text-3xl text-white font-bold shadow-lg">${activeUser.name.charAt(0).toUpperCase()}</div>`
                            }
                            <h2 class="text-xl font-bold text-white mb-1">${activeUser.name}</h2>
                            <p class="text-sm text-slate-400 mb-2">${activeUser.email}</p>
                            ${adminEmails.includes(activeUserEmail) ? '<span class="inline-block bg-blue-600 text-white text-xs px-2 py-1 rounded-full mb-4"><i class="fa-solid fa-shield mr-1"></i> Administrador</span>' : '<span class="inline-block bg-slate-600 text-slate-300 text-xs px-2 py-1 rounded-full mb-4">Participante</span>'}
                            <br>
                            <button onclick="logout()" class="bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-6 rounded-full transition flex items-center justify-center mx-auto">
                                <i class="fa-solid fa-right-from-bracket mr-2"></i> Cerrar Sesión
                            </button>
                        </div>
                    `;
                }
            } else {
                authSection = `
                    <div class="bg-slate-800 p-8 rounded-xl border border-slate-700 shadow-md text-center">
                        <i class="fa-brands fa-google text-5xl text-slate-400 mb-4"></i>
                        <h2 class="text-xl font-bold text-white mb-2">Identificación</h2>
                        <p class="text-sm text-slate-400 mb-6">Inicia sesión con tu cuenta de Google para participar en la quiniela.</p>
                        
                        <button onclick="loginWithGoogle()" class="w-full md:w-auto bg-white hover:bg-gray-100 text-gray-900 font-bold py-3 px-6 rounded-lg transition flex items-center justify-center mx-auto shadow-md">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6 mr-3" alt="Google">
                            Continuar con Google
                        </button>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- SECCIÓN DE AUTENTICACIÓN -->
                    ${authSection}

                    <!-- ADMINISTRACION DE PARTIDOS -->
                    ${(activeUserId && adminEmails.includes(activeUserEmail)) ? `
                    <div class="bg-slate-800 p-6 rounded-xl border border-blue-700 shadow-[0_0_15px_rgba(59,130,246,0.1)]">
                        <div class="flex items-center mb-4 text-blue-400">
                            <i class="fa-solid fa-calendar-plus text-2xl mr-3"></i>
                            <h2 class="text-xl font-bold text-white">Panel de Control (Admin)</h2>
                        </div>
                        <p class="text-sm text-slate-400 mb-4">Crea nuevos encuentros para el torneo.</p>
                        
                        <div class="space-y-3">
                            <input type="text" id="newMatchStage" placeholder="Fase (Ej: Grupo A, Octavos...)" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-white">
                            <input type="date" id="newMatchDate" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-white">
                            
                            <div class="flex space-x-2">
                                <input type="text" id="newMatchTeamA" placeholder="Equipo Local" class="w-1/2 bg-slate-900 border border-slate-600 rounded p-2 text-white text-center">
                                <span class="text-slate-500 flex items-center font-bold">vs</span>
                                <input type="text" id="newMatchTeamB" placeholder="Equipo Visitante" class="w-1/2 bg-slate-900 border border-slate-600 rounded p-2 text-white text-center">
                            </div>

                            <button onclick="createMatch()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded mt-4 transition flex items-center justify-center">
                                <i class="fa-solid fa-plus mr-2"></i> Guardar Partido
                            </button>
                            
                            ${globalData.matches.length === 0 ? `
                            <button onclick="loadSampleMatches()" class="w-full bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm py-2 rounded mt-2 transition border border-slate-600">
                                Cargar Partidos de Prueba
                            </button>
                            ` : ''}
                        </div>
                    </div>
                    ` : `
                    ${activeUserId ? `
                    <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 flex flex-col items-center justify-center text-center opacity-70">
                         <i class="fa-solid fa-shield-halved text-5xl text-slate-600 mb-4"></i>
                         <h3 class="text-xl font-bold text-slate-300">Zona Restringida</h3>
                         <p class="text-slate-500 text-sm mt-2 max-w-xs">Solo los administradores pueden añadir partidos o modificar los resultados del torneo.</p>
                    </div>
                    ` : ''}
                    `}
                </div>
            `;
        }

        window.loginWithGoogle = async function() {
            try {
                document.getElementById('loadingOverlay').classList.remove('hidden');
                document.querySelector('#loadingOverlay p').innerText = "Iniciando sesión con Google...";
                
                // En el entorno Inmersivo, el popup puede estar bloqueado.
                // Firebase recomienda signInWithPopup para web.
                await signInWithPopup(auth, googleProvider);
                // El onAuthStateChanged se encargará del resto
            } catch (error) {
                console.error("Error en login con Google:", error);
                document.getElementById('loadingOverlay').classList.add('hidden');
                
                if (error.code === 'auth/popup-closed-by-user') {
                    showToast("Inicio de sesión cancelado", "warning");
                } else if (error.code === 'auth/popup-blocked') {
                     showToast("El navegador bloqueó la ventana emergente de login. Por favor, permite los popups para este sitio.", "error");
                } else {
                    showToast("Error al iniciar sesión: " + error.message, "error");
                }
            }
        };

        window.logout = async function() {
            try {
                await signOut(auth);
                showToast("Sesión cerrada");
            } catch (error) {
                console.error("Error cerrando sesión:", error);
            }
        };

        window.createMatch = async function() {
            if (!auth.currentUser || !adminEmails.includes(activeUserEmail)) {
                showToast("Acceso denegado", "error"); 
                return; 
            }
            
            const stage = document.getElementById('newMatchStage').value.trim();
            const date = document.getElementById('newMatchDate').value;
            const teamA = document.getElementById('newMatchTeamA').value.trim();
            const teamB = document.getElementById('newMatchTeamB').value.trim();

            if (!stage || !date || !teamA || !teamB) {
                showToast("Todos los campos son obligatorios", "warning");
                return;
            }

            try {
                const colRef = getCollectionRef('matches');
                await addDoc(colRef, {
                    stage,
                    date,
                    teamA,
                    teamB,
                    scoreA: null,
                    scoreB: null,
                    isLocked: false,
                    createdAt: Date.now()
                });
                
                document.getElementById('newMatchTeamA').value = '';
                document.getElementById('newMatchTeamB').value = '';
                showToast("Partido creado exitosamente");
            } catch(e) {
                console.error(e);
                showToast("Error al crear partido", "error");
            }
        };

        window.loadSampleMatches = async function() {
            if (!auth.currentUser || !adminEmails.includes(activeUserEmail)) return;
            const samples = [
                { stage: "Juego Inaugural", date: "2026-06-11", teamA: "México", teamB: "Por Definir" },
                { stage: "Grupo B", date: "2026-06-12", teamA: "Canadá", teamB: "Por Definir" },
                { stage: "Grupo D", date: "2026-06-12", teamA: "EE.UU", teamB: "Por Definir" },
                { stage: "Grupo F", date: "2026-06-15", teamA: "Argentina", teamB: "Alemania" },
                { stage: "Grupo H", date: "2026-06-16", teamA: "Brasil", teamB: "España" }
            ];

            try {
                const colRef = getCollectionRef('matches');
                for (let match of samples) {
                    await addDoc(colRef, {
                        ...match,
                        scoreA: null,
                        scoreB: null,
                        isLocked: false,
                        createdAt: Date.now()
                    });
                }
                showToast("Partidos de prueba cargados");
            } catch(e) {
                console.error(e);
                showToast("Error al cargar partidos", "error");
            }
        };

        function renderNormas() {
            const container = document.getElementById('content-normas');
            container.innerHTML = `
                <div class="bg-slate-800 p-8 rounded-xl shadow border border-slate-700 text-slate-300 leading-relaxed max-w-2xl mx-auto">
                    <h2 class="text-3xl font-bold text-white mb-6 text-center">🏆 Reglas de la Quiniela</h2>
                    
                    <p class="mb-6 text-center text-lg">El sistema de puntuación es automático y se basa en los siguientes criterios al comparar tu pronóstico con el resultado final del partido:</p>

                    <div class="space-y-6">
                        <div class="bg-emerald-900/30 p-4 rounded-lg border border-emerald-800 flex items-start">
                            <div class="bg-emerald-600 rounded-full h-10 w-10 min-w-[40px] flex items-center justify-center font-bold text-white text-xl mr-4">3</div>
                            <div>
                                <h3 class="text-emerald-400 font-bold text-lg mb-1">Puntos por Marcador Exacto</h3>
                                <p class="text-sm">Si aciertas la cantidad exacta de goles que marcó cada equipo. <br><em>Ejemplo: Pronosticas 2-1 y el resultado final es 2-1.</em></p>
                            </div>
                        </div>

                        <div class="bg-yellow-900/30 p-4 rounded-lg border border-yellow-800 flex items-start">
                            <div class="bg-yellow-600 rounded-full h-10 w-10 min-w-[40px] flex items-center justify-center font-bold text-white text-xl mr-4">1</div>
                            <div>
                                <h3 class="text-yellow-400 font-bold text-lg mb-1">Punto por Resultado (Ganador o Empate)</h3>
                                <p class="text-sm">Si no aciertas el marcador exacto, pero sí aciertas qué equipo ganó, o si acertaste que terminaría en empate. <br><em>Ejemplo: Pronosticas 2-0 y el resultado final es 1-0 (Acertaste que ganaba el local).</em></p>
                            </div>
                        </div>

                        <div class="bg-slate-900 p-4 rounded-lg border border-slate-700 flex items-start">
                            <div class="bg-slate-700 rounded-full h-10 w-10 min-w-[40px] flex items-center justify-center font-bold text-white text-xl mr-4">0</div>
                            <div>
                                <h3 class="text-slate-400 font-bold text-lg mb-1">Puntos si fallas</h3>
                                <p class="text-sm">Si el resultado es completamente diferente (gana el otro equipo o empatan y pusiste ganador). <br><em>Ejemplo: Pronosticas 1-0 y el resultado es 0-1.</em></p>
                            </div>
                        </div>
                    </div>

                    <div class="mt-8 pt-6 border-t border-slate-700 text-sm text-center">
                        <i class="fa-solid fa-lock text-slate-500 mb-2 text-xl"></i>
                        <p>Los pronósticos se bloquean automáticamente en cuanto el administrador ingresa un resultado en la pestaña correspondiente.</p>
                    </div>
                </div>
            `;
        }

        // Initialize application when DOM is loaded
        window.addEventListener('DOMContentLoaded', () => {
            initApp();
        });

    </script>
</body>
</html>
